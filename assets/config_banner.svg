<svg width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="configGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B026FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="120" fill="#0a0a0f" rx="10" />
  
  <!-- Decorative lines -->
  <path d="M 20 60 L 150 60 L 170 40 L 630 40 L 650 60 L 780 60" fill="none" stroke="url(#configGrad)" stroke-width="1" stroke-dasharray="5 5" opacity="0.5" />
  
  <!-- Icon: Gear/Config symbol -->
  <g transform="translate(380, 45) scale(0.8)" filter="url(#glow)">
    <path d="M 25 15 L 20 15 L 18 10 L 22 5 L 18 1 L 13 5 L 8 1 L 4 5 L 8 10 L 6 15 L 1 15 L 1 20 L 6 20 L 8 25 L 4 30 L 8 34 L 13 30 L 18 34 L 22 30 L 18 25 L 20 20 L 25 20 Z" fill="none" stroke="#00E5FF" stroke-width="1.5" />
    <circle cx="13" cy="17.5" r="4" fill="none" stroke="#B026FF" stroke-width="1" />
  </g>

  <!-- Text -->
  <text x="50%" y="95" text-anchor="middle" font-family="monospace" font-size="14" fill="#00E5FF" filter="url(#glow)" style="letter-spacing: 8px; text-transform: uppercase; font-weight: bold;">System Configuration</text>
  
  <!-- Border accents -->
  <rect x="10" y="10" width="780" height="100" fill="none" stroke="#B026FF" stroke-width="0.5" opacity="0.3" rx="5" />
</svg>
