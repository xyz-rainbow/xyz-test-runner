<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#B026FF22" stroke-width="0.5"/>
    </pattern>
    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Gradient for Text -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B026FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="#0a0a0f" />
  
  <!-- Animated Grid -->
  <rect width="800" height="200" fill="url(#grid)" />
  
  <!-- Soft Glow Orb -->
  <circle cx="400" cy="100" r="150" fill="radial-gradient(circle, #B026FF11 0%, transparent 70%)" />
  
  <!-- Main Text (XYZ) -->
  <text x="50%" y="45%" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="64" fill="url(#neonGradient)" filter="url(#glow)" style="letter-spacing: 12px;">XYZ</text>
  
  <!-- Subtitle -->
  <text x="50%" y="70%" text-anchor="middle" font-family="'Segoe UI', Roboto, sans-serif" font-weight="200" font-size="18" fill="#e0e0e0" style="letter-spacing: 4px; text-transform: uppercase;">Rainbow Technology</text>
  
  <!-- Accent Lines -->
  <line x1="300" y1="160" x2="500" y2="160" stroke="#00E5FF" stroke-width="2" stroke-dasharray="10 5" filter="url(#glow)" />
  
  <!-- Signatures (Tiny) -->
  <text x="790" y="190" text-anchor="end" font-family="monospace" font-size="8" fill="#444">#xyz-rainbow #rainbowtechnology.xyz</text>
</svg>
